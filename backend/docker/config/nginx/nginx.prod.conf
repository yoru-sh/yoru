# Nginx production configuration for SaaSForge
# SSL/TLS termination, load balancing, and security headers
#
# Compliance:
# - BLOC-002: TLS required in production
# - BLOC-003: TLS 1.2+ only
# - BLOC-004: Timeout configuration for LLM operations
# - BLOC-005: Security headers
# - BLOC-007: Rate limiting

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version

    # Logging format (JSON for structured logs)
    log_format json_combined escape=json
        '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # Upstream for API replicas (load balancing)
    upstream api_backend {
        least_conn;  # Least connections load balancing algorithm

        server api_1:8000 max_fails=3 fail_timeout=30s;
        server api_2:8000 max_fails=3 fail_timeout=30s;
        server api_3:8000 max_fails=3 fail_timeout=30s;

        keepalive 32;  # Keep connections alive for reuse
    }

    # Rate limiting zones
    # General API rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Stricter rate limiting for authentication endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    # Rate limiting for file uploads
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # HTTP server (redirect to HTTPS)
    server {
        listen 80;
        server_name _;

        # Allow health checks over HTTP
        location /health {
            access_log off;
            proxy_pass http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;  # Replace with your domain in production

        # SSL configuration (BLOC-002, BLOC-003)
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # SSL protocols (BLOC-003: TLS 1.2+ only)
        ssl_protocols TLSv1.2 TLSv1.3;

        # SSL ciphers (strong ciphers only)
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers (BLOC-005)
        include /etc/nginx/conf.d/security-headers.conf;

        # Timeouts for LLM operations (BLOC-004)
        proxy_read_timeout 300s;       # 5 minutes for LLM responses
        proxy_connect_timeout 5s;      # Quick connection timeout
        proxy_send_timeout 300s;       # 5 minutes for sending data
        client_body_timeout 300s;      # 5 minutes for request body
        client_header_timeout 10s;     # 10 seconds for headers

        # Request size limits
        client_max_body_size 10m;
        client_body_buffer_size 128k;

        # Connection limit (max 10 connections per IP)
        limit_conn addr 10;

        # Main API location
        location / {
            # Rate limiting (BLOC-007)
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # Proxy headers
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Buffering settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Upstream failover
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Upload endpoints (stricter rate limiting and larger body size)
        location ~ ^/api/v1/.*/(upload|file) {
            limit_req zone=upload_limit burst=3 nodelay;
            limit_req_status 429;

            client_max_body_size 50m;  # Allow larger uploads

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Longer timeouts for uploads
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            client_body_timeout 600s;
        }

        # Health check (no rate limiting, no logging)
        location /health {
            access_log off;
            proxy_pass http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Metrics endpoint (internal only, add IP whitelist if needed)
        location /metrics {
            # Uncomment to restrict access
            # allow 10.0.0.0/8;
            # deny all;

            access_log off;
            proxy_pass http://api_backend/metrics;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
