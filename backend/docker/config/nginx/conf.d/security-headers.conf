# Security headers configuration (BLOC-005 compliance)
# These headers enhance security by protecting against common attacks

# HTTP Strict Transport Security (HSTS)
# Forces browsers to use HTTPS for all future requests
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# X-Content-Type-Options
# Prevents MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-Frame-Options
# Prevents clickjacking attacks
add_header X-Frame-Options "DENY" always;

# X-XSS-Protection
# Enables browser XSS protection
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy
# Controls how much referrer information is shared
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy (CSP)
# Helps prevent XSS and other code injection attacks
# Adjust this based on your frontend requirements
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# Permissions-Policy (formerly Feature-Policy)
# Controls which browser features can be used
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# X-Request-ID (for request tracing)
# This is set by nginx automatically with $request_id
add_header X-Request-ID $request_id always;
