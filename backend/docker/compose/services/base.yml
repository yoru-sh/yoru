# Base services for SaaS stack
# Redis cache service

services:
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - saas_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    name: saas_redis_data

networks:
  saas_network:
    name: saas_network
    driver: bridge
