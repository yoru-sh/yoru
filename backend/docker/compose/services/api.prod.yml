# API service for production environment
# Three API replicas for high availability with nginx load balancer

services:
  api_1:
    build:
      context: ../../..
      dockerfile: docker/image/api/Dockerfile
    image: saasforge-api:latest
    container_name: saas_api_1
    restart: unless-stopped
    # No ports exposed - accessed via nginx only
    env_file:
      - ../../config/env/.env.shared
      - ../../config/env/.env.production
      - ../../config/env/.env.api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - REPLICA_ID=1
    # Docker secrets for sensitive credentials
    # Mounted at /run/secrets/<secret_name> (read-only)
    secrets:
      - supabase_url
      - supabase_anon_key
      - supabase_service_key
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - saas_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api_2:
