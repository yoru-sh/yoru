# Nginx reverse proxy for production environment
# SSL/TLS termination and load balancing across API replicas

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP (redirects to HTTPS)
      - "443:443"  # HTTPS
    volumes:
      - ../../config/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ../../config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../../config/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    env_file:
      - ../../config/env/.env.production
    depends_on:
      - api_1
      - api_2
      - api_3
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  nginx_logs:
