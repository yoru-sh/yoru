<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand_name }}{% endblock %}</title>
    <style>
        /* Reset and base styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f4f4f4;
        }

        /* Container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        /* Header */
        .email-header {
            background-color: #4F46E5;
            padding: 30px 40px;
            text-align: center;
        }

        .email-header h1 {
            margin: 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
        }

        /* Content */
        .email-content {
            padding: 40px;
        }

        .email-content h2 {
            margin-top: 0;
            color: #1f2937;
            font-size: 20px;
            font-weight: 600;
        }

        .email-content p {
            margin: 16px 0;
            color: #4b5563;
        }

        /* Button */
        .button {
            display: inline-block;
            padding: 12px 32px;
            margin: 24px 0;
            background-color: #4F46E5;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #4338CA;
        }

        /* Info box */
        .info-box {
            background-color: #f3f4f6;
            border-left: 4px solid #4F46E5;
            padding: 16px;
            margin: 24px 0;
        }

        .info-box p {
            margin: 0;
            font-size: 14px;
        }

        /* Footer */
        .email-footer {
            background-color: #f9fafb;
            padding: 30px 40px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }

        .email-footer p {
            margin: 8px 0;
            font-size: 14px;
            color: #6b7280;
        }

        .email-footer a {
            color: #4F46E5;
            text-decoration: none;
        }

        .email-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-header,
            .email-content,
            .email-footer {
                padding: 20px !important;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="email-header">
            <h1>{% block header %}{{ brand_name }}{% endblock %}</h1>
        </div>

        <!-- Content -->
        <div class="email-content">
            {% block content %}
            <!-- Email content goes here -->
            {% endblock %}
        </div>

        <!-- Footer -->
        <div class="email-footer">
            {% block footer %}
            <p>
                Need help? Contact us at
                <a href="mailto:{{ support_email }}">{{ support_email }}</a>
            </p>
            {% if company_address %}
            <p>{{ company_address }}</p>
            {% endif %}
            <p>&copy; {{ brand_name }}. All rights reserved.</p>
            {% endblock %}
        </div>
    </div>
</body>
</html>
